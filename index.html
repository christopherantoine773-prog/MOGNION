<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARKGPT | Système Autonome</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ajustements pour que l'iframe soit parfaite */
        #chat-window {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 12px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="logo">DARKGPT</div>
        <nav>
            <button class="nav-btn">Nouveau Chat</button>
            <button class="nav-btn">Historique</button>
        </nav>
    </aside>

    <main class="chat-area">
        <!-- Intégration directe de votre bot Render -->
        <div id="chat-window">
            <iframe 
                src="https://mognion.onrender.com" 
                title="DARKGPT Interface">
            </iframe>
        </div>
        
        <!-- Note : La zone input-container est masquée car Gradio gère déjà ses propres inputs -->
    </main>
</div>

</body>
</html>
