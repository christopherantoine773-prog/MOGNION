<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkGPT Interface</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="logo">DARKGPT</div>
        <nav>
            <button class="nav-btn">Nouveau Chat</button>
            <button class="nav-btn">Historique</button>
        </nav>
    </aside>

    <main class="chat-area">
        <div id="chat-window">
            <!-- Messages ici -->
        </div>

        <div class="input-container">
            <div class="toolbar">
                <button class="tool-btn">📎 Image</button>
                <button class="tool-btn">🎥 Vidéo</button>
                <button class="tool-btn">💾 Exporter</button>
            </div>
            <textarea placeholder="Envoyez un message à DarkGPT..." rows="1"></textarea>
            <button class="send-btn">Envoyer</button>
        </div>
    </main>
</div>

</body>
</html>
